name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    env:
      LAW_API_KEY: ${{ secrets.LAW_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
